<app-card>
  <article>
    <h2>{{ task.title }}</h2>
    <!-- pipes -->
    <!-- DatePipe 還有其他可設置的屬性可以在官網查看 -->
    <time>{{ task.dueDate | date: 'fullDate' }}</time>
    <p>{{ task.summary }}</p>
    <p class="actions">
      <button (click)="onCompleteTask()">complete</button>
    </p>
  </article>
</app-card>
